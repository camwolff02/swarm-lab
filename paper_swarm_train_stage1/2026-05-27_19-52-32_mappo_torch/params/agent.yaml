models:
  factory: paper_swarm_attention
  separate: true
  num_drones: 8
  max_neighbors: 2
  attention_dim: 32
  attention_heads: 1
  hidden_units:
  - 256
  - 256
  - 256
  initial_log_std: -1.5
  clip_log_std: true
  min_log_std: -3.0
  max_log_std: -0.5
agent:
  class: MAPPO
  experiment:
    directory: /home/crwolff/swarm-lab/logs/skrl/paper_swarm/mappo_stage1
    experiment_name: 2026-05-27_19-52-32_mappo_torch
  rollouts: 32
  learning_epochs: 4
  mini_batches: 64
  discount_factor: 0.995
  gae_lambda: 0.95
  kl_threshold: 0.0
  learning_rate: 0.0003
  learning_rate_scheduler: null
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  grad_norm_clip: 1.0
  ratio_clip: 0.1
  value_clip: 0.2
  clip_predicted_values: true
  entropy_loss_scale: 0.0001
  value_loss_scale: 1.0
  observation_preprocessor: RunningStandardScaler
  observation_preprocessor_kwargs:
    size: null
  state_preprocessor: RunningStandardScaler
  state_preprocessor_kwargs:
    size: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs:
    size: null
memory:
  class: RandomMemory
  memory_size: -1
trainer:
  class: SequentialTrainer
  timesteps: 200000
  close_environment_at_exit: false
seed: 42
