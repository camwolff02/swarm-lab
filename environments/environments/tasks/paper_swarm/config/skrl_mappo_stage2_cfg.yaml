# Paper Swarm MAPPO Stage 2 training configuration
# MARL interaction learning: agent count 2→8, sparse→medium obstacles
models:
  factory: paper_swarm_attention
  separate: true
  num_drones: 8
  max_neighbors: 2
  attention_dim: 32
  attention_heads: 1
  hidden_units: [256, 256, 256]
  initial_log_std: 0.0
  clip_log_std: true
  min_log_std: -3.0
  max_log_std: -0.5

agent:
  class: MAPPO
  experiment:
    directory: paper_swarm/mappo_stage2
    experiment_name: ""
  rollouts: 64
  learning_epochs: 4
  mini_batches: 32
  discount_factor: 0.995
  gae_lambda: 0.95
  kl_threshold: 0.01
  learning_rate: 0.0005
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
    max_lr: 0.0005
    min_lr: 0.00005
  grad_norm_clip: 10.0
  ratio_clip: 0.1
  value_clip: 0.1
  entropy_loss_scale: 0.001
  value_loss_scale: 1.0
  observation_preprocessor: RunningStandardScaler
  state_preprocessor: RunningStandardScaler
  value_preprocessor: RunningStandardScaler

memory:
  class: RandomMemory
  memory_size: -1

trainer:
  class: SequentialTrainer
  # 300k env steps: agent count ramps 2→8, obstacles ramp 0→6 sparse
  timesteps: 300000
  close_environment_at_exit: false
seed: 42
